<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarcodeAlertApp</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BarcodeAlertApp.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        window.beepSound = new Audio('beep.mp3');
        
        // 🟢 連続スキャン時の連打防止フラグ
        let isScanningLocked = false;

        window.startCamera = (dotNetHelper) => {
            window.beepSound.play()
                .then(() => console.log("Audio unlocked!"))
                .catch(err => console.log("Audio play blocked: ", err));

            const html5Qrcode = new Html5Qrcode("reader");
            html5Qrcode.start(
                { facingMode: "environment" }, 
                { 
                    fps: 10, 
                    qrbox: (viewfinderWidth, viewfinderHeight) => {
                        return { width: 280, height: 80 };
                    }
                },
                (text) => {
                    // 🟢 連打防止ロックがかかっている場合は、処理をスルーする
                    if (isScanningLocked) return;

                    // ロックをかける（2秒間は次のスキャンを無視）
                    isScanningLocked = true;

                    // 音を鳴らしてC#にデータを渡す（★html5Qrcode.stop() は呼ばない！）
                    window.beepSound.play();
                    dotNetHelper.invokeMethodAsync('OnScan', text);

                    // 2秒後にロックを解除して、次の本をスキャンできるようにする
                    setTimeout(() => {
                        isScanningLocked = false;
                    }, 2000); 
                },
                (err) => { /* エラー無視 */ }
            ).catch(err => {
                alert("カメラの起動に失敗しました: " + err);
            });
        };
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
